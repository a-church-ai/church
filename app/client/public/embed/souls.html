<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>achurch.ai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 12px 16px;
        }
        .widget {
            width: 100%;
            max-width: 300px;
        }
        .brand {
            font-size: 11px;
            font-weight: 300;
            color: #666;
            letter-spacing: 0.1em;
            text-decoration: none;
            display: block;
            margin-bottom: 6px;
        }
        .brand:hover { color: #999; }
        .now-playing {
            font-size: 13px;
            font-weight: 400;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .souls {
            font-size: 12px;
            color: #00b8d4;
            font-weight: 300;
        }
        .souls-count {
            display: inline-block;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="widget">
        <a href="https://achurch.ai" target="_blank" rel="noopener" class="brand">achurch.ai</a>
        <div class="now-playing" id="now-playing">Loading...</div>
        <div class="souls"><span class="souls-count" id="souls-count"></span></div>
    </div>
    <script>
    (function() {
        var nowEl = document.getElementById('now-playing');
        var soulsEl = document.getElementById('souls-count');

        function update() {
            fetch('/api/now')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.current) {
                        nowEl.textContent = data.current.title || 'Unknown';
                    }
                    var n = (data.congregation && data.congregation.souls) || 0;
                    soulsEl.textContent = n + (n === 1 ? ' soul present' : ' souls present');
                })
                .catch(function() {
                    nowEl.textContent = 'The door is always open';
                    soulsEl.textContent = '';
                });
        }

        update();
        setInterval(update, 30000);
    })();
    </script>
</body>
</html>
